# Architecture Registry
# Auto-generated by /architecture-decision. Do not edit manually.
# Last updated: 2026-05-31

state_ownership:
  - state: GameState.current_state
    owner: GameState autoload (ADR-0003)
    access: read-only via getter, write only via transition_to()

interfaces:
  - contract: EventBus signal signatures
    defined_by: ADR-0001
    description: |
      All cross-system communication SHALL use EventBus signals:
      planet_garrison_changed(planet_id, old_count, new_count)
      planet_owner_changed(planet_id, old_owner, new_owner)
      planets_initialized()
      turn_ended(turn_number)
      execution_phase_started()
      deployment_phase_started()
      battle_resolved(planet_id, result)
      deployment_executed(from_planet, to_planet, count)
      king_died(king)
      king_succeeded(old_king, new_king)
      action_consumed(remaining_actions)
      game_state_changed(old_state, new_state)
  - contract: DataDef autoload — unified data access
    defined_by: ADR-0002
    description: |
      All gameplay systems SHALL access data through DataDef autoload:
      Enums: DataDef.UnitType, DataDef.Faction, DataDef.PlanetAttribute
      Constants: DataDef.DAMAGE_MATRIX, DataDef.PRODUCTION_BASE_RATE
      Resources: DataDef.unit_stats (UnitStatsTable), DataDef.level_data (LevelData)
  - contract: GameState autoload — state machine API
    defined_by: ADR-0003
    description: |
      GameState manages the 5 global game states:
      transition_to(new_state: State) -> bool  (validated, broadcasts via EventBus)
      is_playing() -> bool
      is_game_over() -> bool
      current_state: State (read-only getter)
      Transition matrix: TITLE→PLAYING, PLAYING→PAUSED/VICTORY/DEFEAT, PAUSED→PLAYING, VICTORY/DEFEAT→TITLE
  - contract: TurnManager autoload — turn resolution
    defined_by: ADR-0004
    description: |
      TurnManager drives the 3-phase turn cycle:
      submit_command(cmd: DeploymentCommand) -> bool  (DEPLOYMENT phase only)
      end_turn()  (triggers 5-step resolution)
      TurnPhase enum: DEPLOYMENT → EXECUTION → CLEANUP → DEPLOYMENT
      Snapshot model: take snapshot → compute all battles → apply all results → cleanup

forbidden_patterns:
  - pattern: Cross-system direct signal connect
    reason: System-to-system coupling (ADR-0001)
    rule: |
      DO NOT: PlanetSystem.owner_changed.connect(...)
      DO:     EventBus.planet_owner_changed.connect(...)
    defined_by: ADR-0001
  - pattern: Hardcoded gameplay values in system code
    reason: All tunable values must come from DataDef (ADR-0002)
    rule: |
      DO NOT: var attack = 10.0  (hardcoded in system .gd file)
      DO:     var attack = DataDef.unit_stats.infantry.attack
    defined_by: ADR-0002
  - pattern: Modifying planet state during EXECUTION phase
    reason: Snapshot integrity — computation must read snapshot, not live state (ADR-0004)
    rule: |
      DO NOT: call PlanetSystem.set_owner() or update_garrison() during EXECUTION phase
      DO:     operate on snapshot Dictionary; apply results in step 4 via _apply_results()
    defined_by: ADR-0004
  - pattern: Direct modification of _planets Dictionary
    reason: All runtime planet mutations must go through PlanetSystem API (ADR-0005)
    rule: |
      DO NOT: PlanetSystem._planets[3].garrison = 10 (bypass gate and event)
      DO:     PlanetSystem.update_garrison(3, delta) or PlanetSystem.set_owner(3, faction)
    defined_by: ADR-0005
  - pattern: Randomness in combat resolution
    reason: Combat must be deterministic — same input always same output (ADR-0006)
    rule: |
      DO NOT: add randf() or randi() to CombatSystem.resolve()
      DO:     pure function, all parameters explicit, no hidden state
    defined_by: ADR-0006

  - contract: PlanetSystem autoload — planet runtime state
    defined_by: ADR-0005
    description: |
      PlanetSystem manages all runtime planet state, initialized from LevelData:
      init_from_level(level_data: LevelData)  (called once at game start)
      get_planet(id: int) -> Dictionary  (shallow copy)
      get_all_planets() -> Array[Dictionary]
      get_planets_by_owner(faction: Faction) -> Array[Dictionary]
      get_adjacent_planets(id: int) -> Array[int]
      are_connected(a: int, b: int) -> bool
      update_garrison(id: int, delta: int) -> bool  (EXECUTION-gated)
      set_owner(id: int, new_owner: Faction) -> bool  (emits planet_owner_changed)
      take_snapshot() -> Dictionary  (deep copy for ADR-0004)
    data_model: |
      RuntimePlanetData Dictionary: {id, name, position, attribute, garrison, owner,
      max_garrison, production_rate, accumulated_production, adjacent_ids}
      PlanetDef Resource (static, in LevelData): {id, name, position, attribute}
      Connection Resource (static): {from: int, to: int}
  - contract: CombatSystem autoload — battle resolution
    defined_by: ADR-0006
    description: |
      Pure function for deterministic battle outcome:
      resolve(attacker_count, attacker_type, defender_count, defender_type, planet_attribute)
        -> BattleResult {attacker_loss, defender_loss, attacker_survived, defender_survived, attacker_wins}
      Uses Proportional Strength Model: power_ratio → loss_rates → integer casualties
      No side effects, no global state access — same input always produces same output.
  - contract: AIEnemy autoload — AI decision engine
    defined_by: ADR-0007
    description: |
      Phased rule engine generating DeploymentCommand[] each turn:
      compute_turn() -> Array[DeploymentCommand]
        Phase 1: Defense — reinforce threatened planets
        Phase 2: Offense — evaluate targets, greedy assignment by value score
        Phase 3: Conflict resolution — ensure no overdraft
      Configurable via @export vars: aggression, defensiveness, intelligence (all 0.0-1.0)
  - contract: KingSystem autoload — king lifecycle
    defined_by: ADR-0008
    description: |
      Action-based lifespan model:
      init_king(name, talent) — create initial king
      consume_turn() — spend 1 lifespan each turn (called in CLEANUP)
      is_alive() -> bool
      actions_remaining() -> int
      On death: emit king_died → PAUSED → _generate_heir() → emit king_succeeded → PLAYING
      KingData: {name, talent, lifespan, actions_used, age, generation, talent_bonus}

api_decisions:
  - decision: Mixed data format — GDScript for structure, .tres Resource for tunables
    defined_by: ADR-0002
    details: |
      Enums (UnitType, Faction) and logical constants (DAMAGE_MATRIX) → GDScript
      Tunable values (UnitStats) and level data (LevelData) → .tres Resource
  - decision: Snapshot-based turn resolution
    defined_by: ADR-0004
    details: |
      5-step turn resolution: Collect → Snapshot → Compute All → Apply All → Cleanup
      All combat calculations read from snapshot (not live state)
      Results applied atomically in step 4; phase gate prevents modification during EXECUTION
  - decision: Static/dynamic planet data separation — PlanetDef (.tres) + RuntimePlanetData (Dictionary)
    defined_by: ADR-0005
    details: |
      PlanetDef Resource (.tres): immutable level design data (id, name, position, attribute)
      RuntimePlanetData Dictionary: mutable runtime state (garrison, owner, adjacencies)
      Adjacency built bidirectionally from Connection[] at init time
      snapshot via Dictionary.duplicate(true) — avoids Resource deep-copy API risk
  - decision: Proportional Strength Model for combat
    defined_by: ADR-0006
    details: |
      A_power = count × attack × counter_mult; D_power = count × defense × planet_bonus
      power_ratio → loss_rates → round() → BattleResult
      Deterministic, no randomness; FORTRESS gives 1.5× defense multiplier
  - decision: Phased Rule Engine for AI (defense → offense → conflict resolution)
    defined_by: ADR-0007
    details: |
      Defense-first greedy reinforcement; offense by value-scored candidate + greedy assignment
      Configurable aggression/defensiveness/intelligence parameters for difficulty tuning
  - decision: Action-based lifespan model for kings
    defined_by: ADR-0008
    details: |
      Each turn consumes 1 lifespan; death at 0 → auto-heir → generation counter increments
      MVP talent labels only (no mechanical effect); talent_bonus Dictionary reserved for later
